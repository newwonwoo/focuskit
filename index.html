<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FocusKit">
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="manifest.json">
<title>📋 FocusKit</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA0UqHP0P50FjWss90GEnVdNkJD4ZyRbwk",
    authDomain: "focuskit-ffef2.firebaseapp.com",
    projectId: "focuskit-ffef2",
    storageBucket: "focuskit-ffef2.firebasestorage.app",
    messagingSenderId: "60713684347",
    appId: "1:60713684347:web:bc250dbec4ae530ef5c1de"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const messaging = getMessaging(app);

  const VAPID_KEY = 'BM6itY3p20KsyyIoZ_KwDYh94TwpoMOzZ_PtSzxfm6agU-xU3TfQ9IZweY9NUs0NhrkIu97CosOxQfd2BjhxqeU';

  // ── Firebase 저장/불러오기 헬퍼 ──
  const FAMILY_ID = 'family';

  async function fbSave(key, data) {
    try {
      await setDoc(doc(db, 'focuskit', FAMILY_ID, 'data', key), { value: JSON.stringify(data) });
    } catch(e) { console.warn('FB save fail', e); }
  }

  async function fbLoad(key, def) {
    try {
      const snap = await getDoc(doc(db, 'focuskit', FAMILY_ID, 'data', key));
      if (snap.exists()) return JSON.parse(snap.data().value);
    } catch(e) {}
    return def;
  }

  function fbListen(key, cb) {
    return onSnapshot(doc(db, 'focuskit', FAMILY_ID, 'data', key), snap => {
      if (snap.exists()) {
        try { cb(JSON.parse(snap.data().value)); } catch(e) {}
      }
    });
  }

  // FCM 토큰 등록
  async function registerFCM(username) {
    try {
      const sw = await navigator.serviceWorker.ready;
      const token = await getToken(messaging, { vapidKey: VAPID_KEY, serviceWorkerRegistration: sw });
      if (token) {
        await fbSave('fk_fcm_' + (username || 'user'), token);
        console.log('FCM token saved:', token);
      }
      return token;
    } catch(e) {
      console.warn('FCM 등록 실패', e);
      return null;
    }
  }

  // 포그라운드 메시지 수신
  onMessage(messaging, (payload) => {
    console.log('포그라운드 메시지:', payload);
    const { title, body } = payload.notification || {};
    if (title) {
      new Notification(title, { body, icon: '/icon.png', tag: 'focuskit' });
      // 소리
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 880; gain.gain.value = 0.3;
        osc.start(); osc.stop(ctx.currentTime + 0.15);
      } catch(e) {}
    }
  });

  // 전역으로 노출
  window.fbSave  = fbSave;
  window.fbLoad  = fbLoad;
  window.fbListen = fbListen;
  window.registerFCM = registerFCM;
  window.fbReady = true;

  window.dispatchEvent(new Event('fb-ready'));
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0d14;
    --card: #12172a;
    --border: #253047;
    --accent: #60a5fa;
    --green: #34d399;
    --gold: #fbbf24;
    --red: #f87171;
    --cyan: #22d3ee;
    --purple: #c084fc;
    --text: #f1f5f9;
    --text2: #b0bccc;
    --text3: #6b8099;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; font-size: 16px; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  input, textarea, select { font-family: 'Inter', sans-serif; outline: none; }
  button { cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes strikeIn { from { width: 0; } to { width: 100%; } }
  .fadeIn { animation: fadeIn 0.25s ease; }

  /* ── 레이아웃 ── */
  #app { max-width: 880px; margin: 0 auto; padding: 18px 20px; }

  /* ── 헤더 ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 24px; margin-bottom: 22px;
    flex-wrap: wrap; gap: 10px;
  }
  .header-title { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 600; letter-spacing: 1px; color: var(--text); }
  .header-date { font-size: 13px; color: var(--text2); font-family: 'Inter', sans-serif; margin-top: 3px; }
  .nav { display: flex; gap: 4px; }
  .nav-btn {
    background: transparent; border: 1px solid transparent;
    border-radius: 10px; padding: 9px 18px;
    color: var(--text2); font-size: 14px; font-weight: 500;
  }
  .nav-btn.active {
    background: rgba(96,165,250,.18); border-color: rgba(96,165,250,.4);
    color: var(--accent); font-weight: 600;
  }

  /* ── 탭 콘텐츠 ── */
  .tab { display: none; }
  .tab.active { display: block; }

  /* ── 카드 ── */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 22px;
  }
  .stitle {
    font-size: 13px; font-family: 'JetBrains Mono', monospace;
    color: var(--text2); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px;
  }
  .pill {
    display: inline-block;
    font-size: 13px; font-weight: 600;
    padding: 4px 12px; border-radius: 6px;
    white-space: nowrap;
  }

  /* ── 인풋 공통 ── */
  .inp {
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 13px 16px;
    color: var(--text); font-size: 16px; width: 100%;
    transition: border-color .2s;
  }
  .inp:focus { border-color: var(--accent); }
  .inp::placeholder { color: var(--text3); }
  .btn-primary {
    background: var(--accent); border: none; border-radius: 10px;
    padding: 13px 22px; color: #fff; font-weight: 700; font-size: 16px;
  }
  .btn-primary:hover { opacity: .85; }
  .btn-ghost {
    background: transparent; border: 1.5px solid var(--border);
    border-radius: 10px; padding: 13px 16px;
    color: var(--text2); font-size: 16px;
  }

  /* ════════════════════════════════
     TODO
  ════════════════════════════════ */
  #todo-stats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  #todo-progress { height: 6px; background: var(--border); border-radius: 4px; margin-bottom: 16px; overflow: hidden; }
  #todo-progress-bar { height: 100%; background: var(--green); border-radius: 4px; transition: width .4s; width: 0; }
  #todo-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
  #todo-input { flex: 1; }
  #todo-priority {
    background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px;
    padding: 13px 12px; color: var(--accent); font-size: 15px;
    font-family: 'Inter', sans-serif;
  }
  #todo-filters { display: flex; gap: 6px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
  .filter-btn {
    padding: 8px 16px; border-radius: 9px; border: none;
    font-size: 14px; font-weight: 500;
    background: transparent; color: var(--text2);
  }
  .filter-btn.active {
    background: rgba(96,165,250,.2); color: var(--accent);
    outline: 1px solid rgba(59,130,246,.3);
  }
  #todo-list { display: flex; flex-direction: column; gap: 8px; max-height: 420px; overflow-y: auto; }
  .todo-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-radius: 11px;
    background: var(--bg); border: 1.5px solid var(--border);
    transition: opacity .2s;
  }
  .todo-item.done { opacity: .5; }
  .todo-check {
    width: 24px; height: 24px; border-radius: 7px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .15s;
  }
  .todo-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .todo-text { flex: 1; font-size: 16px; color: var(--text); }
  .todo-text.done-text { text-decoration: line-through; color: var(--text3); }
  .todo-date { font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--text3); flex-shrink: 0; }
  .todo-edit-input {
    flex: 1; background: var(--card); border: 1.5px solid var(--accent);
    border-radius: 8px; padding: 6px 10px; color: var(--text); font-size: 16px;
  }
  .icon-btn { background: transparent; border: none; color: var(--text2); font-size: 16px; padding: 4px 8px; }
  .empty-msg { text-align: center; padding: 36px 0; color: var(--text2); font-size: 16px; }

  /* ════════════════════════════════
     HABIT
  ════════════════════════════════ */
  #habit-date-header { display: flex; margin-bottom: 12px; padding-left: 200px; }
  .habit-day-col { width: 42px; text-align: center; }
  .habit-day-label { font-size: 12px; font-family: 'Inter', sans-serif; color: var(--text2); font-weight: 500; }
  .habit-day-label.today-col { color: var(--accent); }
  #habit-rows { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .habit-row { display: flex; align-items: center; gap: 6px; }
  .habit-name-cell { width: 196px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .habit-icon { font-size: 22px; }
  .habit-info { flex: 1; overflow: hidden; }
  .habit-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .habit-meta { display: flex; gap: 6px; margin-top: 3px; }
  .habit-streak { font-size: 12px; font-weight: 600; }
  .habit-cell {
    width: 40px; height: 40px; border-radius: 10px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; transition: all .15s; border: 2px solid var(--border);
    background: var(--bg); color: transparent;
  }
  .habit-cell.done { color: #fff; }
  #habit-add { border-top: 1px solid var(--border); padding-top: 16px; }
  #habit-add-row { display: flex; gap: 8px; margin-bottom: 10px; }
  #habit-new-name { flex: 1; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 15px; }
  #habit-icons { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .icon-pick {
    width: 38px; height: 38px; border-radius: 8px; border: 2px solid var(--border);
    background: transparent; font-size: 20px;
  }
  .icon-pick.sel { border-color: var(--accent); background: rgba(96,165,250,.15); }
  #habit-colors { display: flex; gap: 8px; }
  .color-pick { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
  .color-pick.sel { border-color: #fff; }

  /* ════════════════════════════════
     POMODORO
  ════════════════════════════════ */
  #pomo-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  #pomo-modes { display: flex; gap: 8px; margin-bottom: 20px; }
  .pomo-mode-btn {
    flex: 1; padding: 10px 6px; border-radius: 10px; border: none;
    font-size: 14px; font-weight: 600; background: transparent; color: var(--text2);
  }
  #pomo-ring-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
  #pomo-svg { transform: rotate(-90deg); }
  #pomo-track { fill: none; stroke: var(--border); stroke-width: 9; }
  #pomo-arc { fill: none; stroke-width: 9; stroke-linecap: round; transition: stroke-dashoffset .5s ease, stroke .3s; }
  #pomo-timer-text { font-family: 'JetBrains Mono', monospace; font-size: 38px; font-weight: 600; letter-spacing: 3px; color: var(--text); }
  #pomo-mode-label { font-size: 15px; color: var(--text2); margin-top: 5px; font-weight: 500; }
  #pomo-controls { display: flex; gap: 10px; margin-top: 18px; }
  #pomo-start { border: none; border-radius: 11px; padding: 13px 36px; color: #fff; font-weight: 700; font-size: 17px; }
  #pomo-reset { background: transparent; border: 1.5px solid var(--border); border-radius: 11px; padding: 13px 18px; color: var(--text2); font-size: 20px; }
  #pomo-custom { display: flex; gap: 8px; }
  #pomo-custom-inp { flex: 1; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 15px; }
  #pomo-custom-set { background: var(--border); border: none; border-radius: 10px; padding: 12px 16px; color: var(--text2); font-size: 15px; font-weight: 600; }
  #pomo-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 22px; }
  .pomo-stat { background: var(--bg); border-radius: 11px; padding: 16px; border: 1px solid var(--border); }
  .pomo-stat-label { font-size: 12px; color: var(--text2); margin-bottom: 7px; font-weight: 500; }
  .pomo-stat-val { font-size: 26px; font-weight: 700; color: var(--accent); }
  .pomo-stat-sub { font-size: 13px; color: var(--text2); margin-top: 3px; }
  #pomo-bar-wrap { display: flex; gap: 6px; align-items: flex-end; height: 90px; }
  .pomo-bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .pomo-bar-cnt { font-size: 12px; font-weight: 600; color: var(--accent); }
  .pomo-bar { width: 100%; border-radius: 5px; transition: height .5s; }
  .pomo-bar-day { font-size: 12px; color: var(--text2); font-weight: 500; }

  /* ════════════════════════════════
     NOTE
  ════════════════════════════════ */
  #note-wrap { display: grid; grid-template-columns: 240px 1fr; min-height: 480px; }
  #note-sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  #note-sidebar-top { padding: 16px 14px 10px; }
  #note-list { flex: 1; overflow-y: auto; padding: 0 8px; }
  .note-item {
    padding: 12px 12px; border-radius: 10px; margin-bottom: 4px; cursor: pointer;
    background: transparent; border: 1px solid transparent; transition: all .15s;
  }
  .note-item.active { background: rgba(96,165,250,.15); border-color: rgba(96,165,250,.35); }
  .note-item-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .note-item.active .note-item-title { color: var(--accent); }
  .note-item-meta { display: flex; gap: 6px; align-items: center; font-size: 12px; color: var(--text2); }
  #note-add { padding: 12px 12px 16px; border-top: 1px solid var(--border); }
  #note-add-row { display: flex; gap: 6px; }
  #note-new-title { flex: 1; background: var(--bg); border: 1.5px solid var(--border); border-radius: 9px; padding: 10px 12px; color: var(--text); font-size: 14px; }
  #note-add-btn { width: 100%; background: var(--accent); border: none; border-radius: 10px; padding: 14px; color: #fff; font-size: 18px; font-weight: 700; cursor: pointer; }
  #note-editor { display: flex; flex-direction: column; padding: 22px; }
  #note-editor-header { display: flex; gap: 10px; margin-bottom: 18px; align-items: center; }
  #note-title-inp { flex: 1; background: transparent; border: none; border-bottom: 1.5px solid var(--border); font-size: 22px; font-weight: 700; color: var(--text); padding: 6px 0; font-family: 'Inter', sans-serif; }
  #note-tag-sel { background: var(--bg); border: 1.5px solid var(--border); border-radius: 9px; padding: 8px 12px; color: var(--gold); font-size: 14px; font-weight: 600; }
  #note-del-btn { background: transparent; border: 1.5px solid var(--border); border-radius: 9px; padding: 8px 14px; color: var(--text2); font-size: 14px; }
  #note-body { flex: 1; background: transparent; border: none; color: var(--text); font-size: 16px; line-height: 1.9; resize: none; min-height: 340px; font-family: 'Inter', sans-serif; }
  #note-footer { font-size: 13px; color: var(--text2); margin-top: 10px; }
  #note-empty { display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 16px; }
  #note-search { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 9px; padding: 10px 12px; color: var(--text); font-size: 15px; margin-top: 10px; }

  /* ── 반응형 / PWA ── */
  #bottom-nav { display: none; }

  @media (max-width: 640px) {
    #app { padding: 12px 12px calc(90px + env(safe-area-inset-bottom)) 12px; }
    .header { padding: 14px 16px; border-radius: 12px; }
    .header-title { font-size: 18px; }
    .nav { display: none; }

    #bottom-nav {
      display: flex !important;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(18,23,42,.97);
      border-top: 1px solid var(--border);
      padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
      z-index: 100;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .bnav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 4px; background: none; border: none;
      color: var(--text3); font-size: 12px; font-family: 'Inter', sans-serif; font-weight: 500;
      padding: 6px 0; transition: color .15s;
    }
    .bnav-btn .bnav-icon { font-size: 26px; line-height: 1; }
    .bnav-btn.active { color: var(--accent); }

    .card { border-radius: 12px; padding: 16px; }
    #todo-input-row { flex-wrap: wrap; }
    #todo-priority { width: 100%; }

    #pomo-wrap { grid-template-columns: 1fr; }

    #note-wrap { grid-template-columns: 1fr; }
    #note-sidebar { border-right: none; border-bottom: 1px solid var(--border); max-height: 240px; }
    #note-list { max-height: 140px; }
    #note-body { min-height: 220px; }

    .filter-btn { padding: 9px 12px; font-size: 13px; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- ── 헤더 ── -->
  <div class="header">
    <div>
      <div class="header-title">📋 FocusKit</div>
      <div class="header-date" id="header-date"></div>
    </div>
    <nav class="nav">
      <button class="nav-btn active" onclick="showTab('todo')">✅ 할 일</button>
      <button class="nav-btn" onclick="showTab('habit')">🗓 습관</button>
      <button class="nav-btn" onclick="showTab('pomo')">🍅 포모도로</button>
      <button class="nav-btn" onclick="showTab('note')">📝 노트</button>
      <button class="nav-btn" onclick="showTab('shop')">🛒 쇼핑</button>
    </nav>
    <div id="sync-status" style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace">⏳ 연결 중...</div>
    <button id="notif-btn" onclick="openNotifSettings()" style="background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text2);font-size:20px;cursor:pointer" title="알림 설정">🔔</button>
  </div>

  <!-- ════════════════════════════════
       TODO TAB
  ════════════════════════════════ -->
  <div id="tab-todo" class="tab active fadeIn">
    <div class="card">
      <div class="stitle">✅ 할 일 목록</div>
      <div id="todo-stats"></div>
      <div id="todo-progress"><div id="todo-progress-bar"></div></div>
      <div id="todo-input-row">
        <input id="todo-input" class="inp" placeholder="새 할 일 추가... (Enter)" onkeydown="if(event.key==='Enter')todoAdd()">
        <select id="todo-priority">
          <option value="high">🔴 높음</option>
          <option value="normal" selected>🔵 보통</option>
          <option value="low">⚪ 낮음</option>
        </select>
        <button class="btn-primary" onclick="todoAdd()">추가</button>
      </div>
      <div id="todo-filters">
        <button class="filter-btn active" onclick="todoFilter('all',this)">전체</button>
        <button class="filter-btn" onclick="todoFilter('active',this)">진행중</button>
        <button class="filter-btn" onclick="todoFilter('done',this)">완료</button>
        <button class="filter-btn" onclick="todoFilter('high',this)">🔴 긴급</button>
        <button class="icon-btn" style="margin-left:auto;font-size:11px" onclick="todoClearDone()">완료 삭제</button>
      </div>
      <div id="todo-list"></div>
    </div>
  </div>

  <!-- ════════════════════════════════
       HABIT TAB
  ════════════════════════════════ -->
  <div id="tab-habit" class="tab fadeIn">
    <div class="card">
      <div class="stitle">🗓 습관 트래커</div>
      <div id="habit-date-header"></div>

<script>
const today = () => new Date().toISOString().slice(0, 10);
const dateKey = (offset = 0) => { const d = new Date(); d.setDate(d.getDate() + offset); return d.toISOString().slice(0, 10); };
const dayLabel = (iso) => { const [, m, d] = iso.split('-'); return `${m}/${d}`; };
const WEEKDAYS = ['일','월','화','수','목','금','토'];
const getDOW = (iso) => WEEKDAYS[new Date(iso).getDay()];
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const lsLoad = (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } };
const lsSave = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

async function dbSave(key, data) {
  lsSave(key, data);
  if (window.fbReady) await window.fbSave(key, data);
}

async function dbLoad(key, def) {
  if (window.fbReady) {
    const v = await window.fbLoad(key, null);
    if (v !== null) { lsSave(key, v); return v; }
  }
  return lsLoad(key, def);
}

function dbListen(key, cb) {
  if (window.fbReady) window.fbListen(key, cb);
}

// ════════════════════════════════════════════════════════
//  푸시 알림 (FCM)
// ════════════════════════════════════════════════════════
let notifSettings = lsLoad('fk_notif', { enabled: false, type: 'sound', username: '' });
let myUsername = notifSettings.username || '';
let lastKnownCounts = { tasks: 0, notes: 0, habits: 0 };
let notifInitialized = false;

function openNotifSettings() {
  $('notif-modal').style.display = 'flex';
  $('notif-toggle').checked = notifSettings.enabled;
  $('notif-username').value = notifSettings.username || '';
  const typeEl = document.querySelector(`input[name="notif-type"][value="${notifSettings.type || 'sound'}"]`);
  if (typeEl) typeEl.checked = true;
  updateNotifSlider(notifSettings.enabled);
  $('notif-status').textContent = notifSettings.enabled ? '✅ 알림 활성화됨' : '';
}
function closeNotifSettings() { $('notif-modal').style.display = 'none'; }

function updateNotifSlider(on) {
  const slider = $('notif-slider');
  const knob = $('notif-knob');
  slider.style.background = on ? 'var(--accent)' : 'var(--border)';
  knob.style.transform = on ? 'translateX(24px)' : 'translateX(0)';
}

async function toggleNotif(on) {
  updateNotifSlider(on);
  if (on) {
    $('notif-status').textContent = '⏳ 권한 요청 중...';
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') {
      $('notif-toggle').checked = false;
      updateNotifSlider(false);
      $('notif-status').textContent = '❌ 알림 권한이 거부되었어요. 브라우저 설정에서 허용해주세요!';
      return;
    }
    $('notif-status').textContent = '⏳ FCM 등록 중...';
    try {
      const username = $('notif-username').value.trim() || 'user';
      const token = await window.registerFCM(username);
      if (token) {
        $('notif-status').textContent = '✅ 푸시 알림 등록 완료!';
      } else {
        $('notif-status').textContent = '⚠️ FCM 등록 실패. 브라우저가 지원하지 않을 수 있어요.';
      }
    } catch(e) {
      $('notif-status').textContent = '⚠️ FCM 등록 중 오류: ' + e.message;
    }
  } else {
    $('notif-status').textContent = '';
  }
}

async function saveNotifSettings() {
  const username = $('notif-username').value.trim();
  const type = document.querySelector('input[name="notif-type"]:checked')?.value || 'sound';
  const enabled = $('notif-toggle').checked;
  notifSettings = { enabled, type, username };
  myUsername = username;
  lsSave('fk_notif', notifSettings);
  if (enabled && username && window.registerFCM) {
    await window.registerFCM(username);
  }
  closeNotifSettings();
}

function sendNotif(title, body) {
  if (!notifSettings.enabled) return;
  if (Notification.permission !== 'granted') return;
  new Notification(title, { body, icon: '📋', badge: '📋', tag: 'focuskit' });
  if (notifSettings.type === 'vibrate' && navigator.vibrate) {
    navigator.vibrate([200, 100, 200]);
  } else if (notifSettings.type === 'sound') {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880; gain.gain.value = 0.3;
      osc.start(); osc.stop(ctx.currentTime + 0.15);
    } catch(e) {}
  }
}

function checkAndNotify(key, newData, label) {
  if (!notifInitialized) return;
  if (!notifSettings.enabled) return;
  const newCount = newData.length;
  const oldCount = lastKnownCounts[key] || 0;
  if (newCount > oldCount) {
    const newest = newData[0];
    const addedBy = newest?.addedBy || '상대방';
    if (addedBy !== myUsername) {
      const text = newest?.text || newest?.title || newest?.name || '';
      sendNotif(`📋 FocusKit — ${label} 추가`, `${addedBy}: ${text}`);
    }
  }
  lastKnownCounts[key] = newCount;
}

function noteStartNew() {
  $('note-new-form').style.display = 'block';
  $('note-new-title').focus();
}
function noteCancelNew() {
  $('note-new-form').style.display = 'none';
  $('note-new-title').value = '';
}

function showSyncStatus(ok) {
  const el = $('sync-status');
  if (!el) return;
  el.textContent = ok ? '☁️ 실시간 동기화' : '💾 로컬 저장';
  el.style.color = ok ? 'var(--green)' : 'var(--text3)';
}

$('header-date').textContent = new Date().toLocaleDateString('ko-KR', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  $('tab-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'habit') habitRender();
  if (name === 'pomo')  pomoRenderBars();
  if (name === 'note')  noteRenderList();
}

// ════════════════════════════════════════════════════════
//  TODO
// ════════════════════════════════════════════════════════
let tasks = [];
let todoCurrentFilter = 'all';
let todoEditId = null;
const PRIO_COLOR = { high: 'var(--red)', normal: 'var(--accent)', low: 'var(--text3)' };

function todoSave() { dbSave('fk_tasks', tasks); }

function todoAdd() {
  const inp = $('todo-input');
  const text = inp.value.trim();
  if (!text) return;
  const priority = $('todo-priority').value;
  tasks.unshift({ id: Date.now(), text, done: false, priority, createdAt: today(), addedBy: myUsername });
  inp.value = '';
  todoSave(); todoRender();
}
function todoToggle(id) {
  tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
  todoSave(); todoRender();
}
function todoDelete(id) {
  tasks = tasks.filter(t => t.id !== id);
  todoSave(); todoRender();
}
function todoStartEdit(id) {
  todoEditId = id; todoRender();
  const inp = document.querySelector('.todo-edit-input');
  if (inp) { inp.focus(); inp.select(); }
}
function todoSaveEdit(id) {
  const inp = document.querySelector('.todo-edit-input');
  if (!inp) return;
  const val = inp.value.trim();
  if (val) tasks = tasks.map(t => t.id === id ? { ...t, text: val } : t);
  todoEditId = null; todoSave(); todoRender();
}
function todoCancelEdit() { todoEditId = null; todoRender(); }
function todoClearDone() { tasks = tasks.filter(t => !t.done); todoSave(); todoRender(); }
function todoFilter(f, btn) {
  todoCurrentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); todoRender();
}

function todoRender() {
  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  const high = tasks.filter(t => t.priority === 'high' && !t.done).length;
  const stats = $('todo-stats');
  stats.innerHTML = `
    <span class="pill" style="background:rgba(59,130,246,.18);color:var(--accent);border:1px solid rgba(59,130,246,.3)">${total} 전체</span>
    <span class="pill" style="background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.25)">${done} 완료</span>
    ${high > 0 ? `<span class="pill" style="background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.25)">${high} 긴급</span>` : ''}
    ${total > 0 ? `<span class="pill" style="background:rgba(255,255,255,.06);color:var(--text2);border:1px solid var(--border)">${Math.round(done/total*100)}%</span>` : ''}
  `;
  $('todo-progress-bar').style.width = total > 0 ? `${Math.round(done/total*100)}%` : '0';
  let filtered = tasks;
  if (todoCurrentFilter === 'active') filtered = tasks.filter(t => !t.done);
  else if (todoCurrentFilter === 'done') filtered = tasks.filter(t => t.done);
  else if (todoCurrentFilter === 'high') filtered = tasks.filter(t => t.priority === 'high');
  const list = $('todo-list');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-msg">${todoCurrentFilter === 'done' ? '완료된 항목 없음' : '할 일을 추가해보세요 ✨'}</div>`;
    return;
  }
  list.innerHTML = filtered.map(task => {
    const pc = PRIO_COLOR[task.priority] || 'var(--accent)';
    const isEdit = todoEditId === task.id;
    return `
      <div class="todo-item ${task.done ? 'done' : ''}">
        <div class="todo-check" onclick="todoToggle(${task.id})"
          style="border:1.5px solid ${task.done ? 'var(--green)' : pc};background:${task.done ? 'var(--green)' : 'transparent'}">
          ${task.done ? '<span style="color:#fff;font-size:11px">✓</span>' : ''}
        </div>
        <div class="todo-dot" style="background:${pc}"></div>
        ${isEdit
          ? `<input class="todo-edit-input" value="${esc(task.text)}"
               onkeydown="if(event.key==='Enter')todoSaveEdit(${task.id});if(event.key==='Escape')todoCancelEdit()">`
          : `<span class="todo-text ${task.done ? 'done-text' : ''}">${esc(task.text)}</span>`
        }
        <span class="todo-date">${task.createdAt}</span>
        ${isEdit
          ? `<button class="icon-btn" style="background:var(--green);color:#fff;border-radius:6px;padding:4px 10px;font-size:11px" onclick="todoSaveEdit(${task.id})">저장</button>`
          : `<button class="icon-btn" onclick="todoStartEdit(${task.id})">✏️</button>`
        }
        <button class="icon-btn" onclick="todoDelete(${task.id})">✕</button>
      </div>
    `;
  }).join('');
}

// ════════════════════════════════════════════════════════
//  HABIT
// ════════════════════════════════════════════════════════
let habits = [
  { id: 1, name: '물 2L 마시기', color: '#06b6d4', icon: '💧' },
  { id: 2, name: '30분 운동',    color: '#10b981', icon: '🏃' },
  { id: 3, name: '독서 20분',    color: '#f59e0b', icon: '📖' },
];
let habitLogs = {};
let habitSelectedIcon = '⭐';
let habitSelectedColor = '#3b82f6';

const HABIT_ICONS = ['⭐','💧','🏃','📖','🧘','💪','✍️','🎯','🌱','😴','🍎','🧠','🎵','💻','🧹'];
const HABIT_COLORS = ['#3b82f6','#10b981','#f59e0b','#ef4444','#a855f7','#06b6d4','#ec4899','#f97316'];

function habitSave() { dbSave('fk_habits', habits); }
function habitSaveLogs() { dbSave('fk_habit_logs', habitLogs); }

function habitToggle(id, date) {
  const key = `${id}_${date}`;
  habitLogs[key] = !habitLogs[key];
  habitSaveLogs(); habitRender();
}
function habitAdd() {
  const name = $('habit-new-name').value.trim();
  if (!name) return;
  habits.push({ id: Date.now(), name, color: habitSelectedColor, icon: habitSelectedIcon });
  $('habit-new-name').value = '';
  habitSave(); habitRender();
}
function habitDelete(id) {
  habits = habits.filter(h => h.id !== id);
  habitSave(); habitRender();
}
function habitIsDone(id, date) { return !!habitLogs[`${id}_${date}`]; }
function habitStreak(id) {
  let s = 0;
  for (let i = 0; i >= -90; i--) {
    if (habitIsDone(id, dateKey(i))) s++; else break;
  }
  return s;
}
function habitSelectIcon(ic) {
  habitSelectedIcon = ic;
  document.querySelectorAll('.icon-pick').forEach(b => b.classList.toggle('sel', b.dataset.ic === ic));
}
function habitSelectColor(c) {
  habitSelectedColor = c;
  document.querySelectorAll('.color-pick').forEach(b => b.classList.toggle('sel', b.dataset.c === c));
}
function habitRender() {
  const days = Array.from({ length: 7 }, (_, i) => dateKey(i - 6));
  const todayStr = today();
  $('habit-date-header').innerHTML = days.map(d => `
    <div class="habit-day-col">
      <div class="habit-day-label ${d === todayStr ? 'today-col' : ''}">${getDOW(d)}</div>
      <div class="habit-day-label ${d === todayStr ? 'today-col' : ''}">${dayLabel(d)}</div>
    </div>
  `).join('');
  $('habit-rows').innerHTML = habits.map(h => {
    const streak = habitStreak(h.id);
    const weekDone = days.filter(d => habitIsDone(h.id, d)).length;
    const cells = days.map(d => {
      const done = habitIsDone(h.id, d);
      const isToday = d === todayStr;
      return `<div class="habit-cell ${done ? 'done' : ''}"
        style="background:${done ? h.color : isToday ? h.color + '15' : 'var(--bg)'};border-color:${done ? h.color : isToday ? h.color + '50' : 'var(--border)'};color:${done ? '#fff' : 'transparent'}"
        onclick="habitToggle(${h.id},'${d}')">✓</div>`;
    }).join('');
    return `
      <div class="habit-row">
        <div class="habit-name-cell">
          <span class="habit-icon">${h.icon}</span>
          <div class="habit-info">
            <div class="habit-name">${esc(h.name)}</div>
            <div class="habit-meta">
              ${streak > 0 ? `<span class="habit-streak" style="color:${h.color}">🔥${streak}일</span>` : ''}
              <span style="font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace">${weekDone}/7</span>
            </div>
          </div>
          <button class="icon-btn" onclick="habitDelete(${h.id})">✕</button>
        </div>
        ${cells}
      </div>
    `;
  }).join('');
  $('habit-icons').innerHTML = HABIT_ICONS.map(ic =>
    `<button class="icon-pick ${ic === habitSelectedIcon ? 'sel' : ''}" data-ic="${ic}" onclick="habitSelectIcon('${ic}')">${ic}</button>`
  ).join('');
  $('habit-colors').innerHTML = HABIT_COLORS.map(c =>
    `<div class="color-pick ${c === habitSelectedColor ? 'sel' : ''}" data-c="${c}" style="background:${c}" onclick="habitSelectColor('${c}')"></div>`
  ).join('');
}

// ════════════════════════════════════════════════════════
//  POMODORO
// ════════════════════════════════════════════════════════
const POMO_MODES = [
  { label: '집중',    min: 25, color: '#3b82f6' },
  { label: '짧은 휴식', min: 5,  color: '#10b981' },
  { label: '긴 휴식', min: 15, color: '#f59e0b' },
];
let pomoModeIdx  = 0;
let pomoTotalSec = 1500;
let pomoLeftSec  = 1500;
let pomoRunning  = false;
let pomoTimer    = null;
let pomoSessions = [];

const R = 52, CIRC = 2 * Math.PI * R;

function pomoSetArc() {
  const arc = $('pomo-arc');
  const mode = POMO_MODES[pomoModeIdx];
  const progress = 1 - pomoLeftSec / pomoTotalSec;
  arc.setAttribute('stroke-dasharray', CIRC);
  arc.setAttribute('stroke-dashoffset', CIRC * (1 - progress));
  arc.setAttribute('stroke', mode.color);
  $('pomo-start').style.background = mode.color;
}
function pomoUpdateDisplay() {
  const mm = String(Math.floor(pomoLeftSec / 60)).padStart(2, '0');
  const ss = String(pomoLeftSec % 60).padStart(2, '0');
  $('pomo-timer-text').textContent = `${mm}:${ss}`;
  pomoSetArc();
}
function pomoMode(i, btn) {
  clearInterval(pomoTimer); pomoRunning = false;
  pomoModeIdx = i;
  pomoTotalSec = POMO_MODES[i].min * 60;
  pomoLeftSec  = pomoTotalSec;
  $('pomo-start').textContent = '▶ 시작';
  $('pomo-mode-label').textContent = POMO_MODES[i].label;
  document.querySelectorAll('.pomo-mode-btn').forEach((b, j) => {
    b.classList.toggle('active', j === i);
    b.style.background = j === i ? POMO_MODES[j].color + '20' : 'transparent';
    b.style.color = j === i ? POMO_MODES[j].color : 'var(--text3)';
    b.style.outline = j === i ? `1px solid ${POMO_MODES[j].color}40` : 'none';
  });
  pomoUpdateDisplay();
}
function pomoToggle() {
  if (pomoRunning) {
    clearInterval(pomoTimer); pomoRunning = false;
    $('pomo-start').textContent = '▶ 계속';
  } else {
    pomoRunning = true;
    $('pomo-start').textContent = '⏸ 일시정지';
    pomoTimer = setInterval(() => {
      pomoLeftSec--;
      if (pomoLeftSec <= 0) {
        clearInterval(pomoTimer); pomoRunning = false;
        $('pomo-start').textContent = '▶ 시작';
        if (pomoModeIdx === 0) {
          pomoSessions = [{ date: today(), ts: Date.now() }, ...pomoSessions].slice(0, 300);
          dbSave('fk_pomo', pomoSessions);
          pomoRenderStats();
          sendNotif('🍅 포모도로 완료!', '집중 세션이 끝났어요. 잠깐 쉬어요!');
        }
        pomoLeftSec = 0;
      }
      pomoUpdateDisplay();
    }, 1000);
  }
}
function pomoReset() {
  clearInterval(pomoTimer); pomoRunning = false;
  pomoLeftSec = pomoTotalSec;
  $('pomo-start').textContent = '▶ 시작';
  pomoUpdateDisplay();
}
function pomoCustom() {
  const m = parseInt($('pomo-custom-inp').value);
  if (m > 0 && m <= 120) {
    clearInterval(pomoTimer); pomoRunning = false;
    pomoTotalSec = m * 60; pomoLeftSec = m * 60;
    $('pomo-custom-inp').value = '';
    $('pomo-start').textContent = '▶ 시작';
    pomoUpdateDisplay();
  }
}
function pomoRenderStats() {
  const todaySessions = pomoSessions.filter(s => s.date === today()).length;
  const last7 = Array.from({ length: 7 }, (_, i) => {
    const k = dateKey(i - 6);
    return { date: k, count: pomoSessions.filter(s => s.date === k).length };
  });
  const weekTotal = last7.reduce((a, d) => a + d.count, 0);
  $('pomo-today-val').textContent = `${todaySessions}세션`;
  $('pomo-today-min').textContent = `${todaySessions * 25}분`;
  $('pomo-week-val').textContent  = `${weekTotal}세션`;
  $('pomo-week-min').textContent  = `${weekTotal * 25}분`;
  pomoRenderBars(last7);
}
function pomoRenderBars(last7arg) {
  const last7 = last7arg || Array.from({ length: 7 }, (_, i) => {
    const k = dateKey(i - 6);
    return { date: k, count: pomoSessions.filter(s => s.date === k).length };
  });
  const todayStr = today();
  $('pomo-bar-wrap').innerHTML = last7.map(({ date, count }) => {
    const h = count === 0 ? 4 : Math.min(4 + count * 12, 52);
    const isToday = date === todayStr;
    return `
      <div class="pomo-bar-col">
        <div class="pomo-bar-cnt" style="color:${count > 0 ? 'var(--accent)' : 'transparent'}">${count}</div>
        <div style="flex:1;display:flex;align-items:flex-end;width:100%">
          <div class="pomo-bar" style="height:${h}px;background:${isToday ? 'var(--accent)' : 'var(--border)'};opacity:${count === 0 ? 0.3 : 0.4 + count * 0.12}"></div>
        </div>
        <div class="pomo-bar-day" style="color:${isToday ? 'var(--accent)' : 'var(--text3)'}">${getDOW(date)}</div>
      </div>
    `;
  }).join('');
}

// ════════════════════════════════════════════════════════
//  NOTE
// ════════════════════════════════════════════════════════
let notes = [];
let noteSelected = null;

function noteSave() { dbSave('fk_notes', notes); }
function noteAdd() {
  const title = $('note-new-title').value.trim();
  if (!title) return;
  const n = { id: Date.now(), title, body: '', tag: '', updatedAt: today(), addedBy: myUsername };
  notes.unshift(n);
  noteSelected = n.id;
  $('note-new-title').value = '';
  $('note-new-form').style.display = 'none';
  noteSave(); noteRenderList(); noteRenderEditor();
}
function noteDelete() {
  if (!noteSelected) return;
  if (!confirm('이 노트를 삭제할까요?')) return;
  notes = notes.filter(n => n.id !== noteSelected);
  noteSelected = notes[0]?.id || null;
  noteSave(); noteRenderList(); noteRenderEditor();
}
function noteSelect(id) { noteSelected = id; noteRenderList(); noteRenderEditor(); }
function noteUpdateField(field, val) {
  notes = notes.map(n => n.id === noteSelected ? { ...n, [field]: val, updatedAt: today() } : n);
  noteSave();
  if (field === 'title' || field === 'tag') noteRenderList();
  $('note-footer').textContent = `${($('note-body').value || '').length}자 · ${today()}`;
}
function noteRenderList() {
  const search = ($('note-search').value || '').toLowerCase();
  const filtered = notes.filter(n => n.title.toLowerCase().includes(search) || n.body.toLowerCase().includes(search));
  $('note-list').innerHTML = filtered.length === 0
    ? `<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">노트 없음</div>`
    : filtered.map(n => `
      <div class="note-item ${n.id === noteSelected ? 'active' : ''}" onclick="noteSelect(${n.id})">
        <div class="note-item-title">${esc(n.title)}</div>
        <div class="note-item-meta">
          ${n.tag ? `<span style="color:var(--gold)">${esc(n.tag)}</span>` : ''}
          <span>${n.updatedAt}</span>
        </div>
      </div>`).join('');
}
function noteRenderEditor() {
  const cur = notes.find(n => n.id === noteSelected);
  if (!cur) {
    $('note-editor-header').style.display = 'none';
    $('note-body').style.display = 'none';
    $('note-footer').textContent = '노트를 선택하거나 새로 만드세요';
    return;
  }
  $('note-editor-header').style.display = 'flex';
  $('note-body').style.display = 'block';
  $('note-title-inp').value = cur.title;
  $('note-tag-sel').value   = cur.tag || '';
  $('note-body').value      = cur.body;
  $('note-footer').textContent = `${cur.body.length}자 · ${cur.updatedAt}`;
}

// ════════════════════════════════════════════════════════
//  SHOP
// ════════════════════════════════════════════════════════
let shopItems = lsLoad('fk_shop', [
  { id: 1, name: '유기농 사과', emoji: '🍎' },
  { id: 2, name: '유기농 당근', emoji: '🥕' },
  { id: 3, name: '유기농 우유', emoji: '🥛' },
]);

const SHOP_QUICK = ['유기농 간식', '친환경 세제', '유아 로션', '무농약 채소', '아기 이유식', '유기농 과일', '아이 영양제'];
const SHOP_EMOJIS = ['🍎','🥕','🥛','🧃','🫐','🥦','🧴','🍯','🌾','🐟','🥚','🧸'];

function shopOpen(site, query) {
  if (!query || !query.trim()) { alert('검색어를 입력해주세요!'); return; }
  const q = encodeURIComponent(query.trim());
  const urls = {
    naver: `https://search.shopping.naver.com/search/all?query=${q}&sort=price_asc`,
    google: `https://www.google.com/search?tbm=shop&q=${q}&tbs=p_ord:p`,
    coupang: `https://www.coupang.com/np/search?q=${q}&sorter=priceAsc`
  };
  window.open(urls[site], '_blank');
}
function shopSearchAll() {
  const q = $('shop-search-inp').value.trim();
  if (!q) { alert('검색어를 입력해주세요!'); return; }
  ['naver','google','coupang'].forEach((site, i) => {
    setTimeout(() => shopOpen(site, q), i * 300);
  });
}
function shopAddItem() {
  const name = $('shop-item-inp').value.trim();
  if (!name) return;
  const emoji = SHOP_EMOJIS[Math.floor(Math.random() * SHOP_EMOJIS.length)];
  shopItems.unshift({ id: Date.now(), name, emoji });
  $('shop-item-inp').value = '';
  lsSave('fk_shop', shopItems);
  shopRender();
}
function shopDeleteItem(id) {
  shopItems = shopItems.filter(i => i.id !== id);
  lsSave('fk_shop', shopItems);
  shopRender();
}
function shopSearchItem(name) {
  $('shop-search-inp').value = name;
  ['naver','google','coupang'].forEach((site, i) => {
    setTimeout(() => shopOpen(site, name), i * 300);
  });
}
function shopRender() {
  const list = $('shop-list');
  if (!list) return;
  if (shopItems.length === 0) {
    list.innerHTML = `<div style="text-align:center;padding:30px;color:var(--text2);font-size:18px">관심 품목을 추가해보세요!</div>`;
  } else {
    list.innerHTML = shopItems.map(item => `
      <div style="display:flex;align-items:center;gap:14px;padding:16px;background:var(--bg);border-radius:14px;border:1.5px solid var(--border);margin-bottom:10px">
        <span style="font-size:30px">${item.emoji}</span>
        <div style="flex:1">
          <div style="font-size:20px;font-weight:600;color:var(--text)">${esc(item.name)}</div>
          <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
            <button onclick="shopOpen('naver','${esc(item.name)}')" style="background:#03C75A;border:none;border-radius:8px;padding:7px 12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer">네이버</button>
            <button onclick="shopOpen('google','${esc(item.name)}')" style="background:#4285F4;border:none;border-radius:8px;padding:7px 12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer">구글</button>
            <button onclick="shopOpen('coupang','${esc(item.name)}')" style="background:#E74C3C;border:none;border-radius:8px;padding:7px 12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer">쿠팡</button>
            <button onclick="shopSearchItem('${esc(item.name)}')" style="background:var(--accent);border:none;border-radius:8px;padding:7px 14px;color:#fff;font-size:14px;font-weight:700;cursor:pointer">🔍 전체</button>
          </div>
        </div>
        <button onclick="shopDeleteItem(${item.id})" style="background:transparent;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:6px">✕</button>
      </div>
    `).join('');
  }
  const tags = $('shop-quick-tags');
  if (tags) {
    tags.innerHTML = SHOP_QUICK.map(tag => `
      <button onclick="shopSearchItem('${tag}')" style="background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:10px 16px;color:var(--text2);font-size:15px;font-weight:500;cursor:pointer;transition:all .15s" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text2)'">${tag}</button>
    `).join('');
  }
}

async function initApp() {
  const [t, h, hl, p, n] = await Promise.all([
    dbLoad('fk_tasks', []),
    dbLoad('fk_habits', [
      { id: 1, name: '물 2L 마시기', color: '#06b6d4', icon: '💧' },
      { id: 2, name: '30분 운동',    color: '#10b981', icon: '🏃' },
      { id: 3, name: '독서 20분',    color: '#f59e0b', icon: '📖' },
    ]),
    dbLoad('fk_habit_logs', {}),
    dbLoad('fk_pomo', []),
    dbLoad('fk_notes', [
      { id: 1, title: '환영합니다 👋', body: 'FocusKit에 오신 걸 환영해요!\n\n가족과 함께 실시간으로 공유됩니다 ☁️', tag: '안내', updatedAt: today() }
    ]),
  ]);
  tasks = t; habits = h; habitLogs = hl; pomoSessions = p; notes = n;
  noteSelected = notes[0]?.id || null;
  lastKnownCounts = { tasks: tasks.length, notes: notes.length, habits: habits.length };

  todoRender(); habitRender();
  pomoUpdateDisplay();
  pomoMode(0, document.querySelector('.pomo-mode-btn'));
  pomoRenderStats();
  noteRenderList(); noteRenderEditor();
  showSyncStatus(window.fbReady);
  shopRender();

  setTimeout(() => { notifInitialized = true; }, 2000);

  dbListen('fk_tasks', v => {
    checkAndNotify('tasks', v, '할 일');
    tasks = v; todoRender();
    lastKnownCounts.tasks = v.length;
  });
  dbListen('fk_habits', v => { habits = v; habitRender(); });
  dbListen('fk_habit_logs', v => { habitLogs = v; habitRender(); });
  dbListen('fk_pomo', v => { pomoSessions = v; pomoRenderStats(); });
  dbListen('fk_notes', v => {
    checkAndNotify('notes', v, '노트');
    notes = v;
    lastKnownCounts.notes = v.length;
    if (!notes.find(n => n.id === noteSelected)) noteSelected = notes[0]?.id || null;
    noteRenderList(); noteRenderEditor();
  });
}

function showTabMobile(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn, .bnav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'habit') habitRender();
  if (name === 'pomo')  pomoRenderBars();
  if (name === 'note')  { noteRenderList(); noteRenderEditor(); }
  if (name === 'shop')  shopRender();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

if (window.fbReady) {
  initApp();
} else {
  window.addEventListener('fb-ready', initApp);
  setTimeout(() => { if (!window.fbReady) initApp(); }, 3000);
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}
</script>
