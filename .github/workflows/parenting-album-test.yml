name: parenting-album / test

on:
  push:
    branches: [main]
    paths: ['parenting-album/**']
  pull_request:
    paths: ['parenting-album/**']

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: parenting-album

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: parenting-album/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
