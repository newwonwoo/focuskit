name: parenting-album / weekly Gemini summarize

on:
  # 일요일 22:00 KST = 일요일 13:00 UTC
  schedule:
    - cron: '0 13 * * 0'
  # 수동 실행용
  workflow_dispatch:
    inputs:
      days:
        description: '조회할 일수 (기본 7)'
        required: false
        default: '7'
      dry_run:
        description: 'dry-run 모드 (실제 쓰기 없음)'
        required: false
        default: 'false'
        type: boolean

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: parenting-album

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: parenting-album/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Run weekly summarize
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_RAW_ID: ${{ secrets.NOTION_DB_RAW_ID }}
          NOTION_DB_USERS_ID: ${{ secrets.NOTION_DB_USERS_ID }}
          NOTION_DB_WEEKLY_ID: ${{ secrets.NOTION_DB_WEEKLY_ID }}
          NOTION_DB_COMMENTS_ID: ${{ secrets.NOTION_DB_COMMENTS_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ARGS="--days=${{ github.event.inputs.days || '7' }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "Running: tsx scripts/weekly-summarize.ts $ARGS"
          npx tsx scripts/weekly-summarize.ts $ARGS
