name: parenting-album / build PDF

on:
  workflow_dispatch:
    inputs:
      month:
        description: '앨범 월 (예: 2026-04)'
        required: true
        type: string
      digital_url:
        description: '디지털 앨범 URL (뒷표지, 선택)'
        required: false
        default: 'https://focuskit-five.vercel.app'
        type: string

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: parenting-album

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: parenting-album/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Install Chromium for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Build PDF
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_RAW_ID: ${{ secrets.NOTION_DB_RAW_ID }}
          NOTION_DB_USERS_ID: ${{ secrets.NOTION_DB_USERS_ID }}
          NOTION_DB_WEEKLY_ID: ${{ secrets.NOTION_DB_WEEKLY_ID }}
          NOTION_DB_COMMENTS_ID: ${{ secrets.NOTION_DB_COMMENTS_ID }}
          PDF_OUTPUT_DIR: ./dist
        run: |
          ARGS="--month=${{ github.event.inputs.month }}"
          if [ -n "${{ github.event.inputs.digital_url }}" ]; then
            ARGS="$ARGS --digital-url=${{ github.event.inputs.digital_url }}/album/${{ github.event.inputs.month }}"
          fi
          echo "Running: npx tsx scripts/build-pdf.ts $ARGS"
          npx tsx scripts/build-pdf.ts $ARGS

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: wonwoo-album-${{ github.event.inputs.month }}
          path: parenting-album/dist/wonwoo-album-${{ github.event.inputs.month }}.pdf
          retention-days: 90
